<!DOCTYPE html>

<head>

<title>Happy BOY'S day</title>
<style>

    text-align:center;
    background: linear-gradient(135deg,#000000,#005ccd, #5500ff,#000000);
    padding:50px;
    min-height: 100vh;

}
.card{
    margin-top:150px;
    padding:20px;
    background:white;
    border-radius:15px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
input,button{
    padding:10px;
    font-size:20px;
    margin:10px;

}
</style>

<body>

<h2>Nhập ngày sinh của bạn</h2>
